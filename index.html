<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuicyJenkins - Premium Chat</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Main container */
        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Canvas for effects */
        #effectsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 3; /* Moved in front of chatbox */
            pointer-events: none; /* Allows you to click the chatbox behind the canvas */
        }

        /* Chat window */
        .chat-box {
            width: 520px;
            height: 80vh;
            background: rgba(15, 15, 20, 0.98);
            border-radius: 12px;
            border: 1px solid rgba(255, 105, 180, 0.3);
            box-shadow: 
                0 0 30px rgba(255, 20, 147, 0.2),
                0 0 60px rgba(0, 0, 0, 0.8),
                inset 0 0 30px rgba(255, 20, 147, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        /* Header */
        .chat-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 105, 180, 0.2);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px 12px 0 0;
        }

        .chat-header h1 {
            font-size: 26px;
            color: #ff69b4;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
        }

        .chat-header p {
            font-size: 12px;
            color: rgba(255, 105, 180, 0.7);
            margin-top: 4px;
        }

        /* Messages container */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 10px;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.bot .message-bubble {
            background: rgba(255, 105, 180, 0.12);
            color: rgba(255, 200, 220, 1);
            border-left: 2px solid rgba(255, 20, 147, 0.5);
        }

        .message.user .message-bubble {
            background: rgba(255, 20, 147, 0.25);
            color: #fff;
            border-right: 2px solid rgba(255, 20, 147, 0.6);
        }

        /* Input area */
        .input-section {
            padding: 16px 20px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 105, 180, 0.15);
            border-radius: 0 0 12px 12px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        input[type="text"] {
            flex: 1;
            padding: 11px 16px;
            background: rgba(255, 105, 180, 0.08);
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            border-color: rgba(255, 20, 147, 0.6);
            background: rgba(255, 105, 180, 0.12);
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.2);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 105, 180, 0.4);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 20, 147, 0.3);
            border: 1px solid rgba(255, 20, 147, 0.5);
            border-radius: 8px;
            color: #ff69b4;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: rgba(255, 20, 147, 0.4);
            border-color: rgba(255, 20, 147, 0.7);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255, 20, 147, 0.3);
            border-radius: 3px;
        }

        .messages-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 20, 147, 0.5);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .chat-box {
                width: 95vw;
                height: 85vh;
                border-radius: 8px;
            }

            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>

    <!-- Effects canvas -->
    <canvas id="effectsCanvas"></canvas>

    <!-- Main container -->
    <div class="main-container">
        <!-- Chat window -->
        <div class="chat-box">
            <!-- Header -->
            <div class="chat-header">
                <h1>💋 JuicyJenkins</h1>
                <p>Let's chat...</p>
            </div>

            <!-- Messages -->
            <div class="messages-area" id="messagesArea">
                <div class="message bot">
                    <div class="message-bubble">
                        Hey there... I'm JuicyJenkins. Glad you stopped by. What's on your mind? 💕
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Type something...">
                    <button class="send-btn" id="sendBtn">→</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Setup Canvas
        const canvas = document.getElementById('effectsCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Audio context
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let musicOscillators = [];

        // Background music
        function startBackgroundMusic() {
            const now = audioContext.currentTime;
            const notes = [130.81, 164.81, 196.00, 246.94];
            const duration = 8;

            notes.forEach((freq, idx) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.type = 'sine';
                osc.frequency.value = freq;
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.setValueAtTime(0.08, now + duration);
                
                osc.start(now + idx * 0.3);
                osc.stop(now + duration);
                
                musicOscillators.push(osc);
            });

            setTimeout(startBackgroundMusic, duration * 1000);
        }

        function initAudio() {
            if (audioContext.state === 'suspended') {
                audioContext.resume().then(() => startBackgroundMusic());
            } else {
                startBackgroundMusic();
            }
        }

        setTimeout(initAudio, 500);
        document.addEventListener('click', initAudio, { once: true });

        // Particle system for drops
        let particles = [];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * 2 + 3;
                this.size = 8 + Math.random() * 6;
                this.life = 1;
                this.decay = Math.random() * 0.008 + 0.005;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // Gravity
                this.life -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                
                // Gradient
                const gradient = ctx.createRadialGradient(this.x - 2, this.y - 2, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${0.9 * this.life})`);
                gradient.addColorStop(0.5, `rgba(255, 255, 255, ${0.5 * this.life})`);
                gradient.addColorStop(1, `rgba(200, 230, 255, ${0.2 * this.life})`);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Shine
                ctx.fillStyle = `rgba(255, 255, 255, ${0.6 * this.life})`;
                ctx.beginPath();
                ctx.arc(this.x - this.size * 0.3, this.y - this.size * 0.3, this.size * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // --- NEW DRIP SYSTEM ---
        let drips = [];

        class Drip {
            constructor() {
                const chatBox = document.querySelector('.chat-box');
                const rect = chatBox.getBoundingClientRect();
                
                // Spawn primarily on bottom, sometimes on the sides
                const edge = Math.random();
                if (edge < 0.6) {
                    // Bottom border
                    this.x = rect.left + 5 + Math.random() * (rect.width - 10);
                    this.y = rect.bottom;
                    this.vx = 0;
                } else if (edge < 0.8) {
                    // Left border
                    this.x = rect.left;
                    this.y = rect.top + 20 + Math.random() * (rect.height - 40);
                    this.vx = -0.5; // fall slightly outward
                } else {
                    // Right border
                    this.x = rect.right;
                    this.y = rect.top + 20 + Math.random() * (rect.height - 40);
                    this.vx = 0.5; // fall slightly outward
                }

                this.width = Math.random() * 3 + 2; // 2-5px wide
                this.length = 0;
                this.maxLength = Math.random() * 35 + 10; // how far it stretches before breaking
                this.speed = Math.random() * 0.5 + 0.2;
                this.state = 'growing'; // growing -> falling
                this.dropY = this.y;
                this.dropX = this.x;
                this.opacity = 1;
            }

            update() {
                if (this.state === 'growing') {
                    this.length += this.speed;
                    if (this.length > this.maxLength) {
                        this.state = 'falling';
                    }
                } else {
                    this.dropY += this.speed * 6;
                    this.dropX += this.vx; 
                    
                    // Retract the attached part to the border smoothly
                    this.length = Math.max(0, this.length - this.speed * 0.4); 
                    
                    // Fade out once off screen
                    if (this.dropY > window.innerHeight + 20) {
                        this.opacity -= 0.05;
                    }
                }
            }

            draw(ctx) {
                if (this.opacity <= 0) return;

                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 10;

                // Draw the drip attached to the border
                if (this.length > 0) {
                    ctx.beginPath();
                    // Bottom tip of the stretch
                    ctx.arc(this.x, this.y + this.length, this.width / 2, 0, Math.PI);
                    // Left line connecting to border
                    ctx.lineTo(this.x - this.width / 2, this.y);
                    // Right line connecting to border
                    ctx.lineTo(this.x + this.width / 2, this.y);
                    ctx.fill();
                }

                // Draw the detached falling droplet
                if (this.state === 'falling') {
                    ctx.beginPath();
                    ctx.arc(this.dropX, this.dropY, this.width / 2 + 0.5, 0, Math.PI * 2);
                    
                    // Droplet tail pointing up
                    ctx.moveTo(this.dropX - (this.width / 2 + 0.5), this.dropY);
                    ctx.lineTo(this.dropX + (this.width / 2 + 0.5), this.dropY);
                    ctx.lineTo(this.dropX - this.vx * 8, this.dropY - this.width * 2.5);
                    ctx.fill();
                }

                ctx.restore();
            }

            isDead() {
                return this.opacity <= 0;
            }
        }

        // Spawn drips constantly
        setInterval(() => {
            if (Math.random() > 0.3) {
                drips.push(new Drip());
            }
        }, 120);
        // --- END DRIP SYSTEM ---

        // Falling heads
        let fallingHeads = [];

        class FallingHead {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = -60;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = 2 + Math.random() * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationVel = (Math.random() - 0.5) * 0.1;
                this.img = null;
                this.loaded = false;
                
                const img = new Image();
                img.onload = () => {
                    this.img = img;
                    this.loaded = true;
                };
                img.src = 'head.png';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15;
                this.rotation += this.rotationVel;
            }

            draw(ctx) {
                if (!this.loaded) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = 0.85;
                ctx.drawImage(this.img, -30, -30, 60, 60);
                ctx.restore();
            }

            isDead() {
                return this.y > window.innerHeight + 50;
            }
        }

        // Create particle bursts
        function createBurst(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push(new Particle(x, y));
            }

            // Play sound
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, audioContext.currentTime);
                osc.frequency.exponentialRampToValueAtTime(250, audioContext.currentTime + 0.12);
                
                gain.gain.setValueAtTime(0.15, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0, audioContext.currentTime + 0.12);
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + 0.12);
            } catch (e) {}
        }

        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update and draw particles
            particles = particles.filter(p => {
                p.update();
                if (p.life > 0) {
                    p.draw(ctx);
                    return true;
                }
                return false;
            });

            // Update and draw drips
            drips = drips.filter(drip => {
                drip.update();
                drip.draw(ctx);
                return !drip.isDead();
            });

            // Update and draw heads
            fallingHeads = fallingHeads.filter(head => {
                head.update();
                head.draw(ctx);
                return !head.isDead();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // Create drops at random intervals
        function scheduleBursts() {
            const chatBox = document.querySelector('.chat-box');
            const rect = chatBox.getBoundingClientRect();

            const positions = [
                { x: rect.left - 20, y: rect.top + Math.random() * rect.height },
                { x: rect.right + 20, y: rect.top + Math.random() * rect.height },
                { x: rect.left + Math.random() * rect.width, y: rect.top - 20 },
                { x: rect.left + Math.random() * rect.width, y: rect.bottom + 20 }
            ];

            const pos = positions[Math.floor(Math.random() * positions.length)];
            createBurst(pos.x, pos.y);

            setTimeout(scheduleBursts, 1200 + Math.random() * 1500);
        }

        setTimeout(scheduleBursts, 2000);

        // Create falling heads
        setInterval(() => {
            fallingHeads.push(new FallingHead());
        }, 800);

        // Chat functionality
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        const botResponses = [
            "Mmm, tell me more... 👀",
            "I like where this is going... 😉",
            "You've got my attention 💕",
            "That's exactly what I wanted to hear...",
            "Keep going... I'm listening 👂",
            "You know just what to say... 😏",
            "That's hot... I mean interesting! 🔥",
            "You're fun. I like fun people.",
        ];

        function addMessage(text, isUser) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            msg.innerHTML = `<div class="message-bubble">${text}</div>`;
            messagesArea.appendChild(msg);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function getBotResponse(msg) {
            const lower = msg.toLowerCase();
            if (lower.includes('hi') || lower.includes('hello')) {
                return "Hey yourself... I was hoping you'd show up 😉";
            }
            if (lower.includes('how are you')) {
                return "Better now that you're here... How about you? 💕";
            }
            if (lower.includes('?')) {
                return "Ooh, questions... I like mysterious people 👀";
            }
            return botResponses[Math.floor(Math.random() * botResponses.length)];
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            messageInput.value = '';

            setTimeout(() => {
                addMessage(getBotResponse(text), false);
            }, 400);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        messageInput.focus();
    </script>
</body>
</html>
